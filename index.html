<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e40af">
<title>보장분석 리포트 생성기</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); min-height: 100vh; color: #111; padding: 16px; }
  .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .header { text-align: center; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 2px solid #e5e7eb; }
  .header h1 { font-size: 22px; color: #1e40af; margin: 0 0 8px 0; font-weight: 800; }
  .header p { color: #6b7280; margin: 0; font-size: 13px; }
  .step { margin-bottom: 20px; }
  .step-label { font-weight: 700; color: #1e40af; margin-bottom: 10px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .step-num { background: #1e40af; color: #fff; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; }
  .file-btn { display: block; width: 100%; padding: 20px; background: #f3f4f6; border: 2px dashed #9ca3af; border-radius: 12px; text-align: center; font-size: 16px; font-weight: 600; color: #374151; cursor: pointer; transition: all 0.2s; }
  .file-btn:active { background: #e5e7eb; transform: scale(0.98); }
  .file-btn.has-file { background: #ecfdf5; border-color: #10b981; border-style: solid; color: #065f46; }
  #fileInput { display: none; }
  .generate-btn { width: 100%; padding: 18px; background: #1e40af; color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(30,64,175,0.3); }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { background: #9ca3af; cursor: not-allowed; box-shadow: none; }
  .status { margin-top: 16px; padding: 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; display: none; }
  .status.show { display: block; }
  .status.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
  .status.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; white-space: pre-wrap; word-break: break-word; }
  .status.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #bfdbfe; border-top-color: #1e40af; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result-box { margin-top: 16px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; max-height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.7; white-space: pre-wrap; display: none; }
  .result-box.show { display: block; }
  .download-btn { width: 100%; padding: 16px; background: #10b981; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px; display: none; }
  .download-btn.show { display: block; }
  .download-btn:active { transform: scale(0.98); }
  .footer { text-align: center; color: rgba(255,255,255,0.7); font-size: 11px; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🛡️ 보장분석 리포트 생성기</h1>
    <p>제안서 PDF를 업로드하면 AI가 10개 시나리오 리포트를 자동 생성합니다</p>
  </div>
  <div class="step">
    <div class="step-label"><span class="step-num">1</span>제안서 PDF 업로드</div>
    <label for="fileInput" class="file-btn" id="fileLabel">📄 탭하여 PDF 파일 선택</label>
    <input type="file" id="fileInput" accept="application/pdf,.pdf">
  </div>
  <div class="step">
    <div class="step-label"><span class="step-num">2</span>리포트 생성</div>
    <button class="generate-btn" id="generateBtn" disabled>🚀 보장분석 리포트 생성</button>
  </div>
  <div class="status" id="status"></div>
  <div class="result-box" id="resultBox"></div>
  <button class="download-btn" id="downloadBtn">📥 Word 파일로 다운로드</button>
</div>
<div class="footer">© 2026 현대해상 지점 전용 · Powered by Claude AI</div>
<script>
const API_KEY = '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';

const fileInput = document.getElementById('fileInput');
const fileLabel = document.getElementById('fileLabel');
const generateBtn = document.getElementById('generateBtn');
const statusEl = document.getElementById('status');
const resultBox = document.getElementById('resultBox');
const downloadBtn = document.getElementById('downloadBtn');
let selectedFile = null;
let reportData = null;

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.name.toLowerCase().endsWith('.pdf')) { showStatus('error', 'PDF 파일만 업로드 가능합니다.'); return; }
  selectedFile = file;
  fileLabel.classList.add('has-file');
  fileLabel.innerHTML = `✅ ${file.name}<br><span style="font-size:12px;color:#059669;">${(file.size/1024).toFixed(0)}KB · 탭하여 변경</span>`;
  generateBtn.disabled = false;
  hideStatus();
  resultBox.classList.remove('show');
  downloadBtn.classList.remove('show');
});

generateBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  if (API_KEY === 'YOUR_API_KEY_HERE' || !API_KEY.startsWith('sk-ant-')) {
    showStatus('error', '⚠️ API 키가 설정되지 않았습니다.'); return;
  }
  generateBtn.disabled = true;
  resultBox.classList.remove('show');
  downloadBtn.classList.remove('show');
  try {
    showStatus('info', '<span class="spinner"></span>PDF를 읽는 중...');
    const base64 = await fileToBase64(selectedFile);
    showStatus('info', '<span class="spinner"></span>AI가 담보 내역을 분석 중입니다... (30~60초 소요)');
    const analysis = await callClaude(base64);
    reportData = analysis;
    resultBox.textContent = analysis;
    resultBox.classList.add('show');
    downloadBtn.classList.add('show');
    showStatus('success', '✅ 리포트 생성 완료! 아래 버튼으로 Word 파일을 다운로드하세요.');
  } catch (err) {
    console.error(err);
    showStatus('error', '❌ 오류 발생:\n' + (err.message || err));
  } finally {
    generateBtn.disabled = false;
  }
});

downloadBtn.addEventListener('click', () => {
  if (!reportData) return;
  generateDocx(reportData, selectedFile.name.replace(/\.pdf$/i, ''));
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function callClaude(pdfBase64) {
  const prompt = `당신은 현대해상 보험 지점의 보장분석 전문가입니다. 첨부된 제안서 PDF를 분석해서 고객용 보장분석 리포트를 작성해주세요.

【작성 규칙】
1. 맨 위에 피보험자 정보(성명/성별/만나이/상품명/월보험료/특이사항) 정리. 간편고지 상품이면 "계약일 1년 미만 지급사유 발생시 50% 지급" 경고 표시
2. 가입된 담보를 모두 나열 (보장금액, 납입기간, 보장기간)
3. 성별/나이에 맞는 다빈도 질환 10개 시나리오 작성. 각 시나리오별 지급담보·금액·총수령액을 표로 정리
4. 핵심 영업 포인트 및 보완 제안
5. 표는 마크다운 표 형식 사용
【주의】CAR-T는 혈액암만, 수술Ⅰ~Ⅳ 중복불가, 간편고지는 1년미만 50%지급 필수 명시`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5-20250929',
      max_tokens: 8000,
      messages: [{
        role: 'user',
        content: [
          { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 }},
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    let errMsg = `HTTP ${response.status}`;
    try { const errJson = JSON.parse(errText); errMsg += ': ' + (errJson.error?.message || errText); }
    catch { errMsg += ': ' + errText; }
    throw new Error(errMsg);
  }
  const data = await response.json();
  return data.content[0].text;
}

function generateDocx(text, filename) {
  try {
    const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;
    const lines = text.split('\n');
    const children = [];
    children.push(new Paragraph({
      children: [new TextRun({ text: '보장분석 리포트', bold: true, size: 36, color: '1E40AF' })],
      alignment: AlignmentType.CENTER, spacing: { after: 300 }
    }));
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) { children.push(new Paragraph({ children: [new TextRun('')] })); continue; }
      if (trimmed.startsWith('### ')) {
        children.push(new Paragraph({ children: [new TextRun({ text: trimmed.substring(4), bold: true, size: 24, color: '1E40AF' })], spacing: { before: 200, after: 100 } }));
      } else if (trimmed.startsWith('## ')) {
        children.push(new Paragraph({ children: [new TextRun({ text: trimmed.substring(3), bold: true, size: 28, color: '1E40AF' })], spacing: { before: 240, after: 120 } }));
      } else if (trimmed.startsWith('# ')) {
        children.push(new Paragraph({ children: [new TextRun({ text: trimmed.substring(2), bold: true, size: 32, color: '1E40AF' })], spacing: { before: 280, after: 140 } }));
      } else if (trimmed.includes('**')) {
        const runs = [];
        const parts = trimmed.split(/(\*\*[^*]+\*\*)/g);
        for (const part of parts) {
          if (part.startsWith('**') && part.endsWith('**')) runs.push(new TextRun({ text: part.slice(2, -2), bold: true, size: 22 }));
          else if (part) runs.push(new TextRun({ text: part, size: 22 }));
        }
        children.push(new Paragraph({ children: runs, spacing: { after: 80 } }));
      } else if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
        children.push(new Paragraph({ children: [new TextRun({ text: '• ' + trimmed.substring(2), size: 22 })], indent: { left: 400 }, spacing: { after: 60 } }));
      } else {
        children.push(new Paragraph({ children: [new TextRun({ text: trimmed, size: 22 })], spacing: { after: 80 } }));
      }
    }
    const doc = new Document({ sections: [{ properties: {}, children: children }] });
    Packer.toBlob(doc).then(blob => saveAs(blob, `${filename}_보장분석리포트.docx`));
  } catch (err) {
    console.error(err);
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    saveAs(blob, `${filename}_보장분석리포트.txt`);
  }
}

function showStatus(type, html) { statusEl.className = 'status show ' + type; statusEl.innerHTML = html; }
function hideStatus() { statusEl.className = 'status'; }
</script>
</body>
</html>
